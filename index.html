<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nythera Bloom</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:#050816;
      font-family:Arial, Helvetica, sans-serif;
      color:white;
    }

    canvas{
      display:block;
    }

    .overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      z-index:10;
      background:radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.35));
    }

    .content{
      max-width:700px;
      padding:20px;
    }

    h1{
      font-size:5rem;
      letter-spacing:6px;
      text-transform:uppercase;
      margin-bottom:20px;
      background:linear-gradient(90deg,#8fffd1,#c28bff,#6ee7ff);
      -webkit-background-clip:text;
      color:transparent;
      animation:glow 4s infinite alternate;
    }

    p{
      font-size:1.2rem;
      line-height:1.8;
      color:#d7e3ff;
    }

    .small{
      margin-top:20px;
      font-size:0.9rem;
      opacity:0.7;
    }

    @keyframes glow{
      from{
        filter:drop-shadow(0 0 10px #5fffd2);
      }
      to{
        filter:drop-shadow(0 0 25px #ae7cff);
      }
    }

    .fog{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 30%, rgba(140,0,255,0.15), transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(0,255,200,0.15), transparent 30%);
      animation:fogMove 10s infinite alternate ease-in-out;
      pointer-events:none;
    }

    @keyframes fogMove{
      from{
        transform:translateY(-20px);
      }
      to{
        transform:translateY(20px);
      }
    }
  </style>
</head>

<body>

  <div class="overlay">
    <div class="content">
      <h1>Nythera</h1>
      <p>
        A mythical flower never recorded in any world archive.  
        The Nythera blooms only beneath silent cosmic storms,
        glowing with bioluminescent petals that react to forgotten dreams.
      </p>

      <div class="small">
        Move your mouse to awaken the bloom.
      </div>
    </div>
  </div>

  <div class="fog"></div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

    const scene = new THREE.Scene();

    scene.fog = new THREE.FogExp2(0x050816, 0.045);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.set(0, 2, 12);

    const renderer = new THREE.WebGLRenderer({
      antialias:true,
      alpha:true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    document.body.appendChild(renderer.domElement);

    // LIGHTS
    const ambient = new THREE.AmbientLight(0x88bbff, 0.6);
    scene.add(ambient);

    const pointLight = new THREE.PointLight(0x8b5cf6, 3, 50);
    pointLight.position.set(5,5,5);
    scene.add(pointLight);

    const cyanLight = new THREE.PointLight(0x00ffd5, 2, 50);
    cyanLight.position.set(-5,2,4);
    scene.add(cyanLight);

    // PARTICLES
    const particleGeometry = new THREE.BufferGeometry();
    const particleCount = 1500;

    const positions = [];

    for(let i=0;i<particleCount;i++){
      positions.push(
        (Math.random()-0.5)*60,
        (Math.random()-0.5)*60,
        (Math.random()-0.5)*60
      );
    }

    particleGeometry.setAttribute(
      "position",
      new THREE.Float32BufferAttribute(positions,3)
    );

    const particleMaterial = new THREE.PointsMaterial({
      color:0xb794ff,
      size:0.08,
      transparent:true,
      opacity:0.8
    });

    const particles = new THREE.Points(
      particleGeometry,
      particleMaterial
    );

    scene.add(particles);

    // FLOWER GROUP
    const flower = new THREE.Group();

    // CENTER CORE
    const coreGeo = new THREE.SphereGeometry(0.9, 32, 32);

    const coreMat = new THREE.MeshStandardMaterial({
      color:0x6fffe9,
      emissive:0x00ffee,
      emissiveIntensity:1.5,
      roughness:0.2,
      metalness:0.5
    });

    const core = new THREE.Mesh(coreGeo, coreMat);
    flower.add(core);

    // PETALS
    const petalGeometry = new THREE.ConeGeometry(0.7, 3, 4);

    for(let i=0;i<12;i++){

      const petalMaterial = new THREE.MeshStandardMaterial({
        color:new THREE.Color(
          `hsl(${260 + i*8}, 90%, 65%)`
        ),
        emissive:new THREE.Color(
          `hsl(${260 + i*8}, 100%, 50%)`
        ),
        emissiveIntensity:1,
        roughness:0.3,
        metalness:0.4
      });

      const petal = new THREE.Mesh(
        petalGeometry,
        petalMaterial
      );

      const angle = (Math.PI * 2 / 12) * i;

      petal.position.x = Math.cos(angle) * 2.1;
      petal.position.z = Math.sin(angle) * 2.1;

      petal.rotation.z = Math.PI / 2;
      petal.rotation.y = angle;

      flower.add(petal);
    }

    // INNER PETALS
    for(let i=0;i<8;i++){

      const petalMaterial = new THREE.MeshStandardMaterial({
        color:0x7df9ff,
        emissive:0x7df9ff,
        emissiveIntensity:1.4
      });

      const petal = new THREE.Mesh(
        new THREE.ConeGeometry(0.4, 2, 4),
        petalMaterial
      );

      const angle = (Math.PI * 2 / 8) * i;

      petal.position.x = Math.cos(angle) * 1.2;
      petal.position.z = Math.sin(angle) * 1.2;

      petal.position.y = 0.2;

      petal.rotation.z = Math.PI / 2;
      petal.rotation.y = angle;

      flower.add(petal);
    }

    // STEM
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.15,0.2,8,16),
      new THREE.MeshStandardMaterial({
        color:0x1aff99,
        emissive:0x0aff88,
        emissiveIntensity:0.4
      })
    );

    stem.position.y = -4;
    flower.add(stem);

    scene.add(flower);

    // GROUND
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(20,64),
      new THREE.MeshStandardMaterial({
        color:0x09121f,
        roughness:1
      })
    );

    ground.rotation.x = -Math.PI/2;
    ground.position.y = -6;

    scene.add(ground);

    // MOUSE
    let mouseX = 0;
    let mouseY = 0;

    window.addEventListener("mousemove",(e)=>{
      mouseX = (e.clientX/window.innerWidth - 0.5) * 2;
      mouseY = (e.clientY/window.innerHeight - 0.5) * 2;
    });

    // ANIMATION
    const clock = new THREE.Clock();

    function animate(){

      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      flower.rotation.y += 0.003;

      flower.position.y = Math.sin(t * 1.5) * 0.3;

      flower.rotation.x += (mouseY * 0.3 - flower.rotation.x) * 0.03;
      flower.rotation.z += (mouseX * 0.3 - flower.rotation.z) * 0.03;

      core.scale.setScalar(
        1 + Math.sin(t*3) * 0.08
      );

      particles.rotation.y += 0.0008;

      pointLight.intensity = 2 + Math.sin(t*2);

      renderer.render(scene,camera);
    }

    animate();

    // RESPONSIVE
    window.addEventListener("resize",()=>{

      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(
        window.innerWidth,
        window.innerHeight
      );
    });
  </script>

</body>
</html>
